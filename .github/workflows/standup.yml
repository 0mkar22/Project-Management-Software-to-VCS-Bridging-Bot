name: Daily Standup Agent

on:
  # This runs the script automatically at 3:30 UTC (9:00 AM IST) every weekday
  schedule:
    - cron: '30 3 * * 1-5'
  
  # This allows you to click a button in GitHub to run it manually anytime
  workflow_dispatch: 

jobs:
  run-standup:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use your current Node version

      # 3. Install dependencies (Continuous Integration)
      - name: Install dependencies
        run: npm install

      # 4. Run the script (Continuous Deployment / Execution)
      - name: Run Standup Agent
        run: npx tsx index.ts
        env:
          BASECAMP_ACCESS_TOKEN: ${{ secrets.BASECAMP_ACCESS_TOKEN }}
          BASECAMP_ACCOUNT_ID: ${{ secrets.BASECAMP_ACCOUNT_ID }}
          BASECAMP_PROJECT_IDS: ${{ secrets.BASECAMP_PROJECT_IDS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node dist/index.js # Make sure this matches where tsc outputs your compiled code
