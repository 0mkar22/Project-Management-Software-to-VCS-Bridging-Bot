name: Daily Standup Agent

on:
  # This runs the script automatically at 2:45 UTC (8:15 AM IST) every weekday
  schedule:
    - cron: '45 2 * * 1-5'
  
  # This allows you to click a button in GitHub to run it manually anytime
  workflow_dispatch: 

jobs:
  run-standup:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Use your current Node version

      # 3. Install dependencies (Continuous Integration)
      - name: Install dependencies
        run: npm install

        # 4. Compile TypeScript to JavaScript
      - name: Build TypeScript
        run: npx tsc

      # 5. Run the script (Continuous Deployment / Execution)
      - name: Run Standup Agent
        env:
          BASECAMP_PROJECT_IDS: ${{ secrets.BASECAMP_PROJECT_IDS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          BASECAMP_ACCOUNT_ID: ${{ secrets.BASECAMP_ACCOUNT_ID }}
          BASECAMP_ACCESS_TOKEN: ${{ secrets.BASECAMP_ACCESS_TOKEN }}
          BASECAMP_REFRESH_TOKEN: ${{ secrets.BASECAMP_REFRESH_TOKEN }}
          BASECAMP_CLIENT_ID: ${{ secrets.BASECAMP_CLIENT_ID }}
          BASECAMP_CLIENT_SECRET: ${{ secrets.BASECAMP_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MY_GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }}
        run: node dist/standup-bot-Discord/index.js # Make sure this matches where tsc outputs your compiled code
